<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronokolopa</title>

<style>
* {
    box-sizing: border-box;
}

html, body {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
}

/* 🔥 DAS FIXT ALLES */
body {
    display: flex;
    flex-direction: column;
}

/* TOP */
header {
    background: #1e3a8a;
    color: white;
    text-align: center;
    padding: 60px 20px;
}

/* MAIN */
main {
    flex: 1; /* 🔥 DRÜCKT FOOTER NACH UNTEN */
    display: flex;
    justify-content: center;
    align-items: center;
    background: white;
    padding: 60px 20px;
}

/* BOX */
.box {
    background: #f3f4f6;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
}

/* BUTTON */
a {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 25px;
    background: #1e3a8a;
    color: white;
    text-decoration: none;
    border-radius: 10px;
}

/* FOOTER */
footer {
    background: #1e3a8a;
    color: white;
    text-align: center;
    padding: 30px;
}
</style>
</head>

<body>

<header>
    <h1>Hey, I'm Ronokolopa!</h1>
    <p>
        I'm a Discord bot developer working on useful systems.  
        I also enjoy playing Roblox in my free time.
    </p>
</header>

<main>
    <div class="box">
        <h2>Enkel Hans</h2>
        <p>A simple Discord bot for your server.</p>

        <a href="https://discord.com/oauth2/authorize?client_id=1442983292805714044">
            Bot einladen →
        </a>
    </div>
</main>

<footer>
    © 2026 @ronokolopa
</footer>

</body>
</html>
